name: test

on: [push]

permissions: read-all

jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      redis:
        image: redislabs/redisearch:2.8.8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
        env:
          REDIS_PASSWORD: testpassword

    steps:
      - name: code
        uses: actions/checkout@v4

      - name: go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: test
        env:
          GOEXPERIMENT: jsonv2
          REDIS_ADDR: localhost:6379
          REDIS_PASSWORD: testpassword
        run: |
          go get -v -t ./...
          go test ./...
